<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件分享站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 32px; }
        .header p { margin-top: 8px; opacity: 0.9; }
        .search { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .search input { width: 100%; padding: 12px 18px; font-size: 16px; border: 2px solid #ddd; border-radius: 25px; outline: none; }
        .search input:focus { border-color: #667eea; }
        .cats { max-width: 700px; margin: 0 auto 20px; padding: 0 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .cat-btn { padding: 6px 16px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #667eea; color: white; }
        .list { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .card h3 { font-size: 18px; margin-bottom: 6px; word-break: break-all; }
        .card .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; background: #e8ecff; color: #667eea; margin-bottom: 10px; }
        .card .desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 12px; }
        .card .btn { display: block; text-align: center; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .card .btn:hover { opacity: 0.9; }
        .loading { text-align: center; padding: 60px; color: #999; font-size: 18px; }
        .count { text-align: center; color: #999; font-size: 13px; margin-bottom: 16px; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 软件分享站</h1>
        <p>发现好用的软件 · 免费下载</p>
    </div>
    <div class="search">
        <input type="text" id="kw" placeholder="🔍 搜索软件...">
    </div>
    <div class="count" id="count"></div>
    <div class="list" id="list"><div class="loading">加载中...</div></div>
    <div class="footer">© 2026 软件分享站</div>
    <script>
        var allData = [];

        fetch("https://api.github.com/repos/xc1228/software-share/contents/")
            .then(function(r) { return r.json(); })
            .then(function(files) {
                allData = files
                    .filter(function(f) { return f.type === "file" && f.name !== "index.html" && f.name !== "README.md" && f.name !== "desktop.ini"; })
                    .map(function(f) {
                        var name = f.name.replace(/\.(apk|exe|zip|rar)$/i, "");
                        return { name: name, desc: f.size > 1048576 ? (f.size / 1048576).toFixed(1) + " MB" : (f.size / 1024).toFixed(0) + " KB", tag: "影音播放", link: f.download_url };
                    });
                document.getElementById("count").textContent = "共 " + allData.length + " 个软件";
                render(allData);
            })
            .catch(function() {
                document.getElementById("list").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
            });

        function render(data) {
            var html = "";
            data.forEach(function(s) {
                html += '<div class="card"><h3>' + s.name + '</h3><span class="tag">' + s.tag + '</span><div class="desc">' + s.desc + '</div><a href="' + s.link + '" target="_blank" class="btn">⬇ 下载</a></div>';
            });
            document.getElementById("list").innerHTML = html;
        }

        document.getElementById("kw").oninput = function() {
            var w = this.value.toLowerCase();
            var result = allData.filter(function(s) { return s.name.toLowerCase().indexOf(w) >= 0; });
            render(result);
        };
    </script>
</body>
</html>
