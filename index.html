<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<style>
    :root { --card: #fff; --text: #333; --border: #ddd; --accent: #6c5ce7; --glow: 0 0 12px rgba(108,92,231,0.3); }
    /* 音乐按钮 */
    .music-btn { position: fixed; bottom: 30px; right: 30px; z-index: 99; width: 44px; height: 44px; border-radius: 50%; background: var(--card); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-size: 20px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
    .music-btn:hover { border-color: var(--accent); box-shadow: var(--glow); }
    .music-btn.playing { background: var(--accent); border-color: var(--accent); animation: musicPulse 2s ease-in-out infinite; }
    @keyframes musicPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(108,92,231,0.5); } 50% { box-shadow: 0 0 0 14px rgba(108,92,231,0); } }
    /* 回到顶部 */
    .back-top { position: fixed; bottom: 30px; left: 30px; z-index: 99; width: 44px; height: 44px; border-radius: 50%; background: var(--card); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-size: 20px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
    .back-top:hover { border-color: var(--accent); box-shadow: var(--glow); }
</style>
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto" src="https://github.com/xc1228/software-share/raw/main/bgm.mp3"></audio>
    <button class="music-btn" id="musicBtn" title="背景音乐">🎵</button>
    <!-- 回到顶部 -->
    <button class="back-top" id="backTop" title="回到顶部">↑</button>
    <script>
        // 背景音乐
        var bgm = document.getElementById('bgm');
        var musicBtn = document.getElementById('musicBtn');
        var playing = false;
        musicBtn.onclick = function() {
            if (playing) { bgm.pause(); musicBtn.classList.remove('playing'); musicBtn.textContent = '🎵'; }
            else { bgm.play().then(function() { musicBtn.classList.add('playing'); musicBtn.textContent = '🎶'; }).catch(function() { alert('浏览器阻止了自动播放，请先点击页面任意位置再试'); }); }
            playing = !playing;
        };
        // 回到顶部
        document.getElementById('backTop').onclick = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
        // 键盘快捷键 Ctrl+K 聚焦搜索（保留占位，暂无搜索框）
        document.onkeydown = function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                // 可扩展聚焦搜索
            }
        };
    </script>
</body>
</html>
