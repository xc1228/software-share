<!DOCTYPE html>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件分享站 · 发现好应用</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --text: #e0e0e0;
            --sub: #8888aa;
            --border: #2a2a44;
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #fd79a8);
            --glow: 0 0 30px rgba(108,92,231,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0.15; }
        @keyframes floatUp { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.2; } 90% { opacity: 0.1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
        .hero { position: relative; z-index: 1; text-align: center; padding: 60px 20px 40px; }
        .hero .logo { font-size: 56px; margin-bottom: 10px; animation: bounce 2s ease-in-out infinite; display: inline-block; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .hero h1 { font-size: 42px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 10px; letter-spacing: -1px; }
        .hero .subtitle { color: var(--sub); font-size: 17px; letter-spacing: 2px; }
        .search-wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto 30px; padding: 0 20px; }
        .search-box { display: flex; align-items: center; background: var(--card); border: 2px solid var(--border); border-radius: 50px; padding: 4px 4px 4px 22px; transition: all 0.3s; }
        .search-box:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
        .search-box .icon { font-size: 20px; margin-right: 10px; opacity: 0.5; }
        .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 16px; padding: 12px 0; }
        .search-box input::placeholder { color: #555; }
        .search-box .clear { background: none; border: none; color: var(--sub); cursor: pointer; font-size: 20px; padding: 8px 12px; display: none; border-radius: 50%; }
        .search-box .clear:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .search-box .clear.show { display: block; }
        .stats { position: relative; z-index: 1; text-align: center; margin-bottom: 24px; }
        .stats span { display: inline-block; padding: 6px 18px; background: var(--card); border-radius: 20px; font-size: 13px; color: var(--accent2); border: 1px solid var(--border); }
        .grid { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px 20px 20px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gradient); opacity: 0; transition: opacity 0.35s; }
        .card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 20px 50px rgba(108,92,231,0.2); }
        .card:hover::before { opacity: 1; }
        .card .icon-wrap { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 14px; background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(253,121,168,0.2)); }
        .card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; word-break: break-all; }
        .card .tag-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .card .tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; background: rgba(108,92,231,0.15); color: var(--accent2); }
        .card .size { font-size: 13px; color: var(--sub); margin-bottom: 16px; display: flex; align-items: center; gap: 4px; }
        .card .size .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
        .card .btn { margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 11px; background: var(--gradient); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 14px; transition: all 0.3s; }
        .card .btn:hover { box-shadow: 0 8px 25px rgba(108,92,231,0.4); transform: scale(1.03); }
        .card .btn svg { width: 18px; height: 18px; }
        .loading { grid-column: 1/-1; text-align: center; padding: 80px 20px; }
        .loading .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 18px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--sub); font-size: 14px; }
        .empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
        .empty .icon { font-size: 60px; margin-bottom: 16px; }
        .empty h3 { color: var(--sub); font-size: 18px; margin-bottom: 6px; }
        .empty p { color: #555; font-size: 14px; }
        .footer { position: relative; z-index: 1; text-align: center; padding: 30px 20px; color: #444; font-size: 13px; border-top: 1px solid var(--border); }
        .footer a { color: var(--accent2); text-decoration: none; }
        .music-btn { position: fixed; bottom: 30px; left: 30px; z-index: 99; width: 44px; height: 44px; border-radius: 50%; background: var(--card); color: var(--text); border: 1px solid var(--border); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .music-btn:hover { border-color: var(--accent); box-shadow: var(--glow); }
        .music-btn.playing { background: var(--accent); border-color: var(--accent); animation: musicPulse 2s ease-in-out infinite; }
        @keyframes musicPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(108,92,231,0.5); } 50% { box-shadow: 0 0 0 14px rgba(108,92,231,0); } }
        .back-top { position: fixed; bottom: 30px; right: 30px; z-index: 99; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 20px; opacity: 0; transform: translateY(20px); transition: all 0.3s; box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        .back-top.show { opacity: 1; transform: translateY(0); }
        .back-top:hover { background: var(--accent2); transform: translateY(-3px); }
        @media (max-width: 600px) {
            .hero { padding: 40px 16px 24px; }
            .hero h1 { font-size: 28px; }
            .hero .logo { font-size: 40px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 0 12px 40px; }
            .card { padding: 18px 14px 16px; border-radius: 14px; }
            .card h3 { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    <header class="hero">
        <div class="logo">📦</div>
        <h1>软件分享站</h1>
        <p class="subtitle">D I S C O V E R  ·  D O W N L O A D</p>
    </header>
    <div class="search-wrap">
        <div class="search-box">
            <span class="icon">🔍</span>
            <input type="text" id="kw" placeholder="搜索软件名称...">
            <button class="clear" id="clearBtn" title="清除">✕</button>
        </div>
    </div>
    <div class="stats"><span id="count">加载中...</span></div>
    <div class="grid" id="list">
        <div class="loading"><div class="spinner"></div><p>正在加载软件列表...</p></div>
    </div>
    <footer class="footer">
        <p>© 2026 软件分享站 · Powered by <a href="https://github.com/xc1228/software-share" target="_blank">GitHub</a></p>
    </footer>

    <audio id="bgm" loop src="https://github.com/xc1228/software-share/raw/main/bgm.mp3"></audio>
    <button class="music-btn" id="musicBtn" title="背景音乐">🎵</button>
    <button class="back-top" id="backTop" title="回到顶部">↑</button>

    <script>
        (function() {
            var c = document.getElementById('particles');
            var colors = ['#6c5ce7', '#a29bfe', '#fd79a8', '#74b9ff', '#55efc4'];
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDuration = Math.random() * 15 + 10 + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                c.appendChild(p);
            }
        })();
        var allData = [];
        var icons = ['🎬','📺','🎵','📡','🎮','📀','🎧','💿','📹','🎤'];
        fetch('https://api.github.com/repos/xc1228/software-share/contents/')
            .then(function(r) { return r.json(); })
            .then(function(files) {
                allData = files
                    .filter(function(f) {
                        return f.type === 'file' && !/^(index\.html|README\.md|desktop\.ini|bgm\.mp3)$/i.test(f.name) && !/\.mp3$/i.test(f.name);
                    })
                    .map(function(f, i) {
                        var name = f.name.replace(/\.(apk|exe|zip|rar|7z)$/i, '');
                        var size = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + ' MB' : (f.size / 1024).toFixed(0) + ' KB';
                        var ext = f.name.split('.').pop().toUpperCase();
                        return { name: name, size: size, ext: ext, tag: '影音播放', icon: icons[i % icons.length], link: f.download_url };
                    });
                document.getElementById('count').textContent = '📊 共 ' + allData.length + ' 款软件';
                render(allData);
            })
            .catch(function() {
                document.getElementById('list').innerHTML = '<div class="empty"><div class="icon">😵</div><h3>加载失败</h3><p>请刷新页面重试</p></div>';
            });
        function render(data) {
            var list = document.getElementById('list');
            if (!data.length) {
                list.innerHTML = '<div class="empty"><div class="icon">🔍</div><h3>没有找到匹配的软件</h3><p>试试其他关键词吧</p></div>';
                return;
            }
            var html = '';
            data.forEach(function(s) {
                html += '<div class="card"><div class="icon-wrap">' + s.icon + '</div><h3>' + s.name + '</h3><div class="tag-row"><span class="tag">' + s.tag + '</span></div><div class="size"><span class="dot"></span>' + s.size + ' · ' + s.ext + '</div><a href="' + s.link + '" target="_blank" class="btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>下载</a></div>';
            });
            list.innerHTML = html;
        }
        var kw = document.getElementById('kw');
        var clearBtn = document.getElementById('clearBtn');
        kw.oninput = function() {
            var w = this.value.toLowerCase();
            clearBtn.classList.toggle('show', w.length > 0);
            var result = allData.filter(function(s) { return s.name.toLowerCase().indexOf(w) >= 0; });
            render(result);
        };
        clearBtn.onclick = function() { kw.value = ''; clearBtn.classList.remove('show'); render(allData); kw.focus(); };

        var bgm = document.getElementById('bgm');
        var musicBtn = document.getElementById('musicBtn');
        var playing = false;
        musicBtn.onclick = function() {
            if (playing) { bgm.pause(); musicBtn.classList.remove('playing'); musicBtn.textContent = '🎵'; }
            else { bgm.play().then(function() { musicBtn.classList.add('playing'); musicBtn.textContent = '🎶'; }).catch(function() { alert('请先点击页面任意位置，再点击播放'); }); }
            playing = !playing;
        };

        var backTop = document.getElementById('backTop');
        window.onscroll = function() { backTop.classList.toggle('show', window.scrollY > 400); };
        backTop.onclick = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
        document.onkeydown = function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); kw.focus(); }
        };
    </script>
</body>
</html>
