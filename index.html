<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件分享站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 32px; }
        .header p { margin-top: 8px; opacity: 0.9; }
        .search { max-width: 500px; margin: 20px auto; padding: 0 20px; }
        .search input { width: 100%; padding: 12px 18px; font-size: 16px; border: 2px solid #ddd; border-radius: 25px; outline: none; }
        .search input:focus { border-color: #667eea; }
        .cats { max-width: 700px; margin: 0 auto 20px; padding: 0 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .cat-btn { padding: 6px 16px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 20px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #667eea; color: white; }
        .list { max-width: 900px; margin: 0 auto; padding: 0 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .card h3 { font-size: 20px; margin-bottom: 6px; }
        .card .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; background: #e8ecff; color: #667eea; margin-bottom: 10px; }
        .card .desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 12px; }
        .card .meta { font-size: 12px; color: #999; margin-bottom: 12px; }
        .card .btn { display: block; text-align: center; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .card .btn:hover { opacity: 0.9; }
        .footer { text-align: center; padding: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 软件分享站</h1>
        <p>发现好用的软件 · 免费下载</p>
    </div>
    <div class="search">
        <input type="text" id="kw" placeholder="🔍 搜索软件...">
    </div>
    <div class="cats" id="cats"></div>
    <div class="list" id="list"></div>
    <div class="footer">© 2026 软件分享站</div>
    <script>
        var data = [
            { name: "南瓜影院", desc: "4.4版本", tag: "影音播放", ver: "4.4", size: "APK", link: "https://github.com/xc1228/software-share/raw/main/%E5%8D%97%E7%93%9C%E5%BD%B1%E9%99%A24.4.apk" },
            { name: "大吉", desc: "1.5.11版本", tag: "影音播放", ver: "1.5.11", size: "APK", link: "https://github.com/xc1228/software-share/releases/download/v1.0/1.5.11.apk" }
        ];

        var cats = [...new Set(data.map(function(s) { return s.tag; }))];
        var html = '<button class="cat-btn active" data-cat="all">全部</button>';
        cats.forEach(function(c) { html += '<button class="cat-btn" data-cat="' + c + '">' + c + '</button>'; });
        document.getElementById("cats").innerHTML = html;

        var currentCat = "all";

        document.querySelectorAll(".cat-btn").forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll(".cat-btn").forEach(function(b) { b.classList.remove("active"); });
                this.classList.add("active");
                currentCat = this.dataset.cat;
                filter();
            };
        });

        function filter() {
            var w = document.getElementById("kw").value.toLowerCase();
            var result = data.filter(function(s) {
                var matchCat = currentCat === "all" || s.tag === currentCat;
                var matchKw = s.name.toLowerCase().indexOf(w) >= 0 || s.desc.toLowerCase().indexOf(w) >= 0;
                return matchCat && matchKw;
            });
            show(result);
        }

        function show(list) {
            var html = "";
            list.forEach(function(s) {
                html += '<div class="card"><h3>' + s.name + '</h3><span class="tag">' + s.tag + '</span><div class="desc">' + s.desc + '</div><div class="meta">' + s.ver + ' | ' + s.size + '</div><a href="' + s.link + '" target="_blank" class="btn">⬇ 下载</a></div>';
            });
            document.getElementById("list").innerHTML = html;
        }

        document.getElementById("kw").oninput = filter;
        show(data);
    </script>
</body>
</html>
